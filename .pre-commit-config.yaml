repos:
  - repo: local
    hooks:
      - id: black
        name: Running black
        entry: python -m black
        language: system
        types: [python]
        args: [--line-length=120]

      - id: flake8
        name: Running flake8
        entry: python -m flake8
        language: system
        types: [python]
        args: ["--max-line-length=120", "--extend-ignore=E203,W503,W291,E501"]
